<!DOCTYPE html>
<html lang="en">
<head>
<title>Alumni – Corona Model College</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo"><span class="logo-icon">🎓</span><div><h2>Corona Model</h2><span style="font-size:10px;color:#475569;">Admin Portal</span></div></div>
  <nav>
    <a href="admin-dashboard.html">📊 Dashboard</a>
    <a href="announcements.html">📢 Announcements</a>
    <a href="reportcard.html">📋 Report Cards</a>
    <a href="fees.html">💰 School Fees</a>
    <a href="alumni.html" class="active">🎓 Alumni</a>
    <a href="manage-accounts.html">🔐 Manage Accounts</a>
    <a href="settings.html">⚙️ Settings</a>
  </nav>
  <button onclick="doLogout()" class="logout-btn">⏻ Logout</button>
</div>
<div class="mobile-topbar">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <span class="mobile-title">Alumni</span>
</div>
<div class="main-content">
  <div class="topbar"><h1>🎓 Alumni Database</h1><p class="topbar-sub">All graduated students. Records are permanently preserved.</p></div>
  <div class="card">
    <div class="card-header-row">
      <h3>Graduated Students</h3>
      <input class="search-input" id="alumniSearch" placeholder="🔍 Search name or year..." oninput="filterAlumni()">
    </div>
    <table>
      <thead><tr><th>Photo</th><th>Full Name</th><th>Graduated Class</th><th>Graduation Year</th><th>Session</th><th>Action</th></tr></thead>
      <tbody id="alumniTable"></tbody>
    </table>
  </div>
</div>
<script type="module" src="app.js"></script>
<script type="module">
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const session = window.requireRole("admin");
if(!session) throw new Error("Not authorised");

let allAlumni=[];
window.doLogout=function(){signOut(window.auth).then(()=>{window.clearSession();window.location.href="login.html";});};
window.toggleSidebar=function(){document.getElementById("sidebar").classList.toggle("open");};

setTimeout(async()=>{
  const db=window.db;
  const snap=await getDocs(collection(db,"students"));
  allAlumni=[];
  snap.forEach(d=>{const data=d.data();if(data.status==="graduated")allAlumni.push({id:d.id,...data});});
  renderAlumni(allAlumni);

  window.filterAlumni=function(){
    const q=document.getElementById("alumniSearch").value.toLowerCase();
    renderAlumni(allAlumni.filter(s=>(s.fullName||s.name||"").toLowerCase().includes(q)||(s.graduatedSession||"").toLowerCase().includes(q)||(s.graduatedClass||"").toLowerCase().includes(q)));
  };
},500);

function renderAlumni(list){
  const tbody=document.getElementById("alumniTable");tbody.innerHTML="";
  if(list.length===0){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:#475569;padding:40px;">No graduated students yet.</td></tr>`;return;}
  list.forEach(s=>{
    const photo=s.photo?`<img src="${s.photo}" style="width:40px;height:50px;object-fit:cover;border-radius:6px;border:2px solid #d4a24c;">`:`<div style="width:40px;height:50px;background:#0f172a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;">👤</div>`;
    tbody.innerHTML+=`<tr><td>${photo}</td><td style="font-weight:600;">${s.fullName||s.name||"—"}</td><td><span class="class-badge">${s.graduatedClass||s.class||"—"}</span></td><td style="color:#d4a24c;font-weight:600;">${s.graduationYear||"—"}</td><td style="color:#94a3b8;">${s.graduatedSession||"—"}</td><td><a href="student.html?id=${s.id}" class="btn-view">View Profile</a></td></tr>`;
  });
}
</script>
</body>
</html>
