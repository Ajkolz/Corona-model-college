<!DOCTYPE html>
<html lang="en">
<head>
<title>Login – Corona Model College</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#d4a24c;--dark:#0f172a;--darker:#020617;--mid:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;}
body{font-family:'DM Sans',sans-serif;background:var(--darker);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;background-image:radial-gradient(ellipse at 20% 50%,rgba(212,162,76,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(59,130,246,0.04) 0%,transparent 50%);}
.school-header{text-align:center;margin-bottom:32px;animation:fadeDown 0.6s ease;}
.school-logo-circle{width:92px;height:92px;border-radius:50%;border:3px solid var(--gold);background:var(--mid);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 16px;box-shadow:0 0 32px rgba(212,162,76,0.15);}
.school-logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.school-name{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5vw,34px);font-weight:700;color:var(--gold);letter-spacing:0.3px;line-height:1.2;}
.school-motto{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:15px;margin:6px 0 8px;}
.school-address{font-size:12px;color:#475569;line-height:1.6;}
.login-card{background:var(--mid);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:420px;animation:fadeUp 0.5s ease;}
.login-title{text-align:center;font-size:15px;color:var(--text);font-weight:600;margin-bottom:22px;}
.role-tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--dark);border-radius:10px;padding:4px;}
.role-tab{flex:1;padding:9px 4px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;}
.role-tab:hover{color:var(--text);}
.role-tab.active{background:var(--gold);color:var(--darker);}
.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:6px;font-weight:600;}
.form-group input{width:100%;padding:12px 14px;background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:var(--gold);}
.form-group input::placeholder{color:#475569;}
.role-hint{font-size:12px;color:#475569;margin-bottom:18px;text-align:center;background:var(--dark);padding:8px 12px;border-radius:8px;border:1px solid var(--border);}
.btn-login{width:100%;padding:13px;background:var(--gold);color:var(--darker);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;letter-spacing:0.3px;}
.btn-login:hover{opacity:0.88;}
.login-error{margin-top:14px;color:#fca5a5;font-size:13px;text-align:center;display:none;background:#450a0a;padding:10px;border-radius:8px;}
.login-footer{text-align:center;margin-top:20px;font-size:12px;color:#1e293b;}
.public-link{text-align:center;margin-top:12px;}
.public-link a{color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.2s;}
.public-link a:hover{color:var(--gold);}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:480px){.login-card{padding:24px 16px;}.role-tab{font-size:12px;padding:8px 2px;}}
</style>
</head>
<body>

<div class="school-header">
  <div class="school-logo-circle">🎓</div>
  <div class="school-name">Corona Model College</div>
  <div class="school-motto">"Raising Great Minds!"</div>
  <div class="school-address">
    Ibeju, Lekki, Lagos Island, Lagos State<br>
    📞 +234 803 133 032 &nbsp;·&nbsp; ✉️ admin.coronaschools@gmail.com
  </div>
</div>

<div class="login-card">
  <div class="login-title">School Portal Login</div>

  <div class="role-tabs">
    <button class="role-tab active" onclick="setRole('admin',this)">🔑 Admin</button>
    <button class="role-tab" onclick="setRole('teacher',this)">👨‍🏫 Teacher</button>
    <button class="role-tab" onclick="setRole('student',this)">👨‍🎓 Student</button>
  </div>

  <div class="role-hint" id="roleHint">Login with your admin email and password.</div>

  <div class="form-group">
    <label id="idLabel">Email Address</label>
    <input type="text" id="loginId" placeholder="Enter your email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="Enter your password">
  </div>

  <button class="btn-login" onclick="doLogin()">Login →</button>
  <div class="login-error" id="loginError"></div>
</div>

<div class="public-link">
  <a href="public.html">🌐 Visit School Website</a>
</div>

<div class="login-footer">Corona Model College School Management System</div>

<script type="module" src="app.js"></script>
<script type="module">
import { signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { collection, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let currentRole = "admin";

// Redirect if already logged in
const existing = window.getSession();
if(existing) window.routeByRole(existing.role);

window.setRole = function(role, btn){
  currentRole = role;
  document.querySelectorAll(".role-tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  const idLabel  = document.getElementById("idLabel");
  const roleHint = document.getElementById("roleHint");
  const loginId  = document.getElementById("loginId");
  if(role==="admin"){
    idLabel.textContent  = "Email Address";
    loginId.placeholder  = "Enter admin email";
    loginId.type         = "email";
    roleHint.textContent = "Login with your admin email and password.";
  } else if(role==="teacher"){
    idLabel.textContent  = "Class ID";
    loginId.placeholder  = "e.g. CLASS-BASIC1A";
    loginId.type         = "text";
    roleHint.textContent = "Login with your Class ID and class password.";
  } else {
    idLabel.textContent  = "Admission Number";
    loginId.placeholder  = "e.g. CMC/2024/001";
    loginId.type         = "text";
    roleHint.textContent = "Login with your Admission Number and password.";
  }
};

window.doLogin = async function(){
  const id       = document.getElementById("loginId").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errorEl  = document.getElementById("loginError");
  errorEl.style.display = "none";
  if(!id||!password){ showError("Please enter your ID and password."); return; }
  const db = window.db;
  try {
    if(currentRole==="admin"){
      await signInWithEmailAndPassword(window.auth, id, password);
      window.saveSession({role:"admin",email:id});
      window.location.href = "admin-dashboard.html";
    } else if(currentRole==="teacher"){
      const snap = await getDocs(query(collection(db,"classAccounts"),
        where("classId","==",id.toUpperCase()),
        where("password","==",password)
      ));
      if(snap.empty){ showError("Incorrect Class ID or password."); return; }
      const data = snap.docs[0].data();
      window.saveSession({role:"teacher",classId:data.classId,className:data.className,docId:snap.docs[0].id});
      window.location.href = "teacher-dashboard.html";
    } else {
      const snap = await getDocs(query(collection(db,"students"),
        where("admissionNumber","==",id),
        where("loginPassword","==",password)
      ));
      if(snap.empty){ showError("Incorrect Admission Number or password."); return; }
      const data = snap.docs[0].data();
      window.saveSession({role:"student",studentId:snap.docs[0].id,name:data.fullName||data.name,class:data.class});
      window.location.href = "student-portal.html";
    }
  } catch(err){ showError(err.message||"Login failed. Please try again."); }
};

function showError(msg){
  const el = document.getElementById("loginError");
  el.textContent   = msg;
  el.style.display = "block";
}

document.getElementById("loginPassword").addEventListener("keydown",e=>{
  if(e.key==="Enter") window.doLogin();
});
</script>
</body>
</html>
